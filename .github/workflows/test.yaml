name: Running pytest
on: [push, workflow_dispatch, pull_request]
jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version:
          - "3.11"
          - "3.12"
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        uses: PythonSpring/actions/pytest@main
        with:
          python-version: ${{ matrix.python-version }}
          pytest-args: ${{ github.event_name == 'pull_request' && '-m "not postgres"' || '' }}
