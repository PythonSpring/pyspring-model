name: Running pytest
on: [push, workflow_dispatch, pull_request]
jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version:
          - "3.11"
          - "3.12"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install pdm
          pdm install -d

      - name: Run tests (excluding e2e)
        run: pdm run pytest -m "not e2e and not postgres"

      # SQLite E2E
      - name: Run e2e tests
        run: pdm run pytest -m "e2e and not postgres"

      # Postgres
      - name: Run postgres tests
        run: pdm run pytest -m "postgres and not e2e"

      # Postgres E2E
      - name: Run postgres e2e tests
        run: pdm run pytest -m "postgres and e2e"
