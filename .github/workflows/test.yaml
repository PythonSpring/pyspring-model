name: Running pytest
on: [push, workflow_dispatch, pull_request]
jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version:
          - "3.11"
          - "3.12"
    steps:
      - uses: actions/checkout@v4

      - name: Run tests (excluding e2e)
        uses: PythonSpring/actions/pytest@main
        with:
          python-version: ${{ matrix.python-version }}
          pytest-args: '-m "not e2e and not postgres"'

      # SQLite E2E
      - name: Run e2e tests
        uses: PythonSpring/actions/pytest@main
        with:
          python-version: ${{ matrix.python-version }}
          pytest-args: '-m "e2e and not postgres"'

      # Postgres
      - name: Run postgres tests
        uses: PythonSpring/actions/pytest@main
        with:
          python-version: ${{ matrix.python-version }}
          pytest-args: '-m "postgres and not e2e"'

      # Postgres E2E
      - name: Run postgres e2e tests
        uses: PythonSpring/actions/pytest@main
        with:
          python-version: ${{ matrix.python-version }}
          pytest-args: '-m "postgres and e2e"'
