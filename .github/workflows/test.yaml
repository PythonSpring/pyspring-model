name: Running pytest
on: [push, workflow_dispatch, pull_request]
jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install pdm
        run: pip install pdm

      - name: Install dependencies
        run: pdm install

      - name: Run tests
        run: pdm run pytest